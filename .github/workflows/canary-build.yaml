name: Canary Build
on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *' # Hourly

jobs:
  canary-build-pre-setup:
    name: Canary build pre-setup
    runs-on: ubuntu-24.04
    outputs:
      do_canary_build: ${{ steps.pre-setup.outputs.do_canary_build }}
      git_commit_sha: ${{ steps.pre-setup.outputs.git_commit_sha }}
    steps:
      - uses: actions/checkout@main
      - uses: NixOS/nix-installer-action@main
        with:
          installer-version: latest
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Performing pre-setup
        id: pre-setup
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -x
          CURRENT_STEP_EXIT_CODE=0

          # Always run this first because the last step in this job
          # depends on an updated lockfile. Additionally, the last job
          # also depends on an updated lockfile.
          nix flake update
          echo "git_commit_sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

          PREVIOUS_RUN_ID="$(gh run list --workflow=canary-build.yaml --limit 2 --json databaseId --jq '.[1].databaseId')"
          if [[ -n "${PREVIOUS_RUN_ID}" ]] then
              gh run download "${PREVIOUS_RUN_ID}" --name previous-job-info --dir $PWD
          else
              echo 'ERROR: Could not determine $PREVIOUS_RUN_ID for some reason'
              touch previous-job-info
              CURRENT_STEP_EXIT_CODE=1
          fi
          cat previous-job-info

          FLAKE_STORE_PATH="$(nix flake archive --json . 2>/dev/null | nix run github:nixos/nixpkgs?ref=nixos-unstable#jq 2>/dev/null -- --raw-output '.path' 2>/dev/null)"
          if [[ -n "${FLAKE_STORE_PATH}" ]]; then
              if grep -q "${FLAKE_STORE_PATH}:true" previous-job-info; then
                  echo "do_canary_build=false" >> "$GITHUB_OUTPUT"
              else
                  echo "do_canary_build=true" >> "$GITHUB_OUTPUT"
              fi
          else
              echo "do_canary_build=true" >> "$GITHUB_OUTPUT"
              echo 'ERROR: Could not determine $FLAKE_STORE_PATH for some reason'
              CURRENT_STEP_EXIT_CODE=1
          fi

          exit $CURRENT_STEP_EXIT_CODE

      - uses: actions/upload-artifact@v7
        with:
          path: flake.lock
          name: flake.lock.new
          if-no-files-found: error
          overwrite: true
          compression-level: 9
          retention-days: 1

  canary-build:
    name: Canary build (${{ matrix.nixSystem }} | ${{ matrix.flakeOutput }})
    # https://github.com/actions/partner-runner-images/tree/main/images
    runs-on:  ${{ matrix.nixSystem == 'x86_64-linux' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    needs: canary-build-pre-setup
    if: needs.canary-build-pre-setup.outputs.do_canary_build == 'true'
    strategy:
      fail-fast: false
      matrix:
        nixSystem: [ aarch64-linux, x86_64-linux, ]
        flakeOutput: [ apps, devShells, homeConfigurations, isoImagesUncompressed, kexecTree, nixosConfigurations, packages, ]

    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ needs.canary-build-pre-setup.outputs.git_commit_sha }}
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            substituters = https://cache.nixos.org https://nix-cache.thefossguy.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= 10.0.0.24:g29fjBRU/VGj6kkIQqjm0o5sxWduZ1hNNLTnSeF/AAU=
            experimental-features = nix-command flakes

      - uses: actions/download-artifact@v7
        with:
          name: flake.lock.new
          path: flake.lock.new
      - name: Running the CI
        run: |
          set -x
          mv flake.lock.new/flake.lock flake.lock
          nix run .#packages.${{ matrix.nixSystem }}.navya-ci -- \
              --flake-path "$(realpath .)" \
              --machine-role quick_ci \
              --nix-system ${{ matrix.nixSystem }} \
              --flake-output-to-build ${{ matrix.flakeOutput }} \
              #EOF

  canary-build-aftermath:
    name: Canary build aftermath
    runs-on: ubuntu-24.04
    needs: canary-build
    if: always()
    steps:
      - uses: actions/checkout@main
        with:
          ref: ${{ needs.canary-build-pre-setup.outputs.git_commit_sha }}
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - uses: actions/download-artifact@v7
        with:
          name: flake.lock.new
          path: flake.lock.new
      - name: Upload artifact determination
        continue-on-error: true
        run: |
          set -x
          CANARY_BUILD_STATUS=${{ needs.canary-build.result }}
          echo "${CANARY_BUILD_STATUS}"
          touch previous-job-info
          mv flake.lock.new/flake.lock flake.lock
          FLAKE_STORE_PATH="$(nix flake archive --json . 2>/dev/null | nix run github:nixos/nixpkgs?ref=nixos-unstable#jq 2>/dev/null -- --raw-output '.path' 2>/dev/null)"
          [[ -z "${FLAKE_STORE_PATH}" ]] && exit 1
          if [[ "${CANARY_BUILD_STATUS}" == 'success' ]] || [[ "${CANARY_BUILD_STATUS}" == 'skipped' ]]; then
              echo "${FLAKE_STORE_PATH}:true" | tee previous-job-info
          elif [[ "${CANARY_BUILD_STATUS}" == 'failure' ]] || [[ "${CANARY_BUILD_STATUS}" == 'cancelled' ]]; then
              echo "${FLAKE_STORE_PATH}:false" | tee previous-job-info
          else
              echo '...'
              exit 1
          fi

      - uses: actions/upload-artifact@v7
        with:
          path: previous-job-info
          name: previous-job-info
          if-no-files-found: error
          overwrite: true
          compression-level: 9
          retention-days: 1
