name: Canary Build
on:
  workflow_dispatch:
  schedule:
    - cron: '30 * * * *' # Hourly

jobs:
  canary-build:
    name: Canary build (${{ matrix.nixSystem }} | ${{ matrix.flakeOutput }})
    # https://github.com/actions/partner-runner-images/tree/main/images
    runs-on:  ${{ matrix.nixSystem == 'x86_64-linux' && 'ubuntu-24.04' || 'ubuntu-24.04-arm' }}
    strategy:
      fail-fast: false
      matrix:
        nixSystem: [ aarch64-linux, x86_64-linux, ]
        flakeOutput: [ apps, devShells, homeConfigurations, isoImagesUncompressed, kexecTree, nixosConfigurations, packages, ]

    steps:
      - run: TZ='Asia/Kolkata' date +'%Y/%m/%d %H:%M:%S'
      - uses: actions/checkout@main
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            substituters = https://cache.nixos.org https://nix-cache.thefossguy.com
            trusted-public-keys = cache.nixos.org-1:6NCHdD59X431o0gWypbMrAURkbJ16ZPMQFGspcDShjY= 10.0.0.24:g29fjBRU/VGj6kkIQqjm0o5sxWduZ1hNNLTnSeF/AAU=
            experimental-features = nix-command flakes

      - name: Running the CI
        run: |
          nix flake update
          nix run .#packages.${{ matrix.nixSystem }}.navya-ci -- \
              --flake-path "$(realpath .)" \
              --machine-role quick_ci \
              --nix-system ${{ matrix.nixSystem }} \
              --flake-output-to-build ${{ matrix.flakeOutput }} \
              #EOF

  canary-build-aftermath:
    name: Canary build aftermath
    runs-on: ubuntu-24.04
    needs: canary-build
    if: always()
    steps:
      - uses: actions/checkout@main
      - uses: NixOS/nix-installer-action@main
        with:
          extra-conf: |
            experimental-features = nix-command flakes

      - name: Upload artifact determination
        run: |
          nix flake update
          FLAKE_STORE_PATH="$(nix flake archive --json . 2>/dev/null | nix run github:nixos/nixpkgs?ref=nixos-unstable#jq 2>/dev/null -- --raw-output '.path' 2>/dev/null)"
          CANARY_BUILD_STATUS=${{ needs.canary-build.result }}
          [[ -z "${FLAKE_STORE_PATH}" ]] && exit 1
          if [[ "${CANARY_BUILD_STATUS}" == 'success' ]] || [[ "${CANARY_BUILD_STATUS}" == 'skipped' ]]; then
              echo "${FLAKE_STORE_PATH}:true" > previous-job-info
          elif [[ "${CANARY_BUILD_STATUS}" == 'failure' ]] || [[ "${CANARY_BUILD_STATUS}" == 'cancelled' ]]; then
              echo "${FLAKE_STORE_PATH}:false" > previous-job-info
          else
              exit 1
          fi

      - uses: actions/upload-artifact@main
        with:
          path: previous-job-info
          name: previous-job-info
          if-no-files-found: error
          overwrite: true
          compression-level: 9
          retention-days: 1
